{% extends 'base.html' %}

{% block title %}パスワード変更 | 管理{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 class="h4 fw-bold mb-0">パスワード変更</h1>
      <a href="{% url 'panel_dashboard' %}" class="btn btn-sm btn-outline-secondary">ダッシュボードへ</a>
    </div>

    {% if messages %}
      {% for msg in messages %}
        <div class="alert alert-{{ msg.tags }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}

    <div class="card">
      <div class="card-body">
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-semibold">現在のパスワード</label>
            <input type="password" name="current_password" class="form-control" required>
          </div>
          <div class="mb-3">
            <label class="form-label fw-semibold">新しいパスワード</label>
            <input type="password" name="new_password1" class="form-control" required minlength="8">
            <div class="form-text">8文字以上</div>
          </div>
          <div class="mb-4">
            <label class="form-label fw-semibold">新しいパスワード（確認）</label>
            <input type="password" name="new_password2" class="form-control" required minlength="8">
          </div>
          <div class="d-grid">
            <button type="submit" class="btn btn-primary">変更する</button>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
