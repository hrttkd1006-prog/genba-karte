{% extends 'base.html' %}

{% block title %}レビューの削除 | げんばカルテ{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-md-6">
    <div class="card border-danger">
      <div class="card-header bg-danger text-white fw-bold">
        <i class="bi bi-trash"></i> レビューの削除
      </div>
      <div class="card-body">
        <p>以下のレビューを削除しますか？この操作は取り消せません。</p>
        <div class="bg-light rounded p-3 mb-4">
          <p class="fw-bold mb-1">{{ review.hospital.name }}</p>
          <div class="d-flex gap-1 mb-1">
            {% for i in "12345" %}
              <i class="bi bi-star{% if forloop.counter <= review.overall_rating %}-fill{% endif %} text-warning" style="font-size:.85rem;"></i>
            {% endfor %}
          </div>
          <p class="small text-muted mb-0">{{ review.created_at|date:"Y年n月d日" }}</p>
        </div>
        <form method="post">
          {% csrf_token %}
          <button type="submit" class="btn btn-danger me-2">削除する</button>
          <a href="{% url 'profile' %}" class="btn btn-outline-secondary">キャンセル</a>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
