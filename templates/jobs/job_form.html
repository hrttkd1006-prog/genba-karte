{% extends 'base.html' %}
{% load crispy_forms_tags %}

{% block title %}求人情報{{ action }} | げんばカルテ{% endblock %}

{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <h1 class="h4 fw-bold mb-4">求人情報{{ action }}</h1>
    <form method="post">
      {% csrf_token %}
      {{ form|crispy }}
      <div class="d-flex gap-2 mt-4">
        <button type="submit" class="btn btn-primary">保存する</button>
        <a href="{% url 'hospital_admin_dashboard' %}" class="btn btn-outline-secondary">キャンセル</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
